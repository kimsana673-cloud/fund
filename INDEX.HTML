<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <style>
        /* Basic styling to make it look clean */
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 40px auto; padding: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        input, textarea { width: 100%; padding: 8px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #28a745; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; }
        button:hover { background-color: #218838; }
        #statusMessage { margin-top: 15px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <h2>Contact Us</h2>
    
    <form id="contactForm">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <label for="message">Message:</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <button type="submit" id="submitBtn">Send Message</button>
    </form>

    <div id="statusMessage"></div>

    <script>
        // --- YOUR WEB APP URL ---
        const webAppUrl = 'https://script.google.com/macros/s/AKfycbwkVLT0Dg9S3m3k0IcITA1opC9vuooxLEVdsjdDRzry3uHOKp-gcGcMPBoxAJe80GOu/exec';

        const form = document.getElementById('contactForm');
        const statusMessage = document.getElementById('statusMessage');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', function(e) {
            e.preventDefault(); // Prevents the default page reload

            // Update UI to show submission is in progress
            statusMessage.style.color = 'blue';
            statusMessage.textContent = 'Sending...';
            submitBtn.disabled = true;

            // Package the form data
            const formData = new FormData(form);

            // Send data to Google Apps Script
            fetch(webAppUrl, {
                method: 'POST',
                // URLSearchParams is used so Apps Script can read it as standard POST parameters
                body: new URLSearchParams(formData) 
            })
            .then(response => {
                statusMessage.style.color = 'green';
                statusMessage.textContent = 'Message sent successfully!';
                form.reset(); // Clear the form fields
                submitBtn.disabled = false;
                
                // Optional: clear the success message after 5 seconds
                setTimeout(() => { statusMessage.textContent = ''; }, 5000);
            })
            .catch(error => {
                console.error('Error!', error.message);
                statusMessage.style.color = 'red';
                statusMessage.textContent = 'An error occurred. Please try again.';
                submitBtn.disabled = false;
            });
        });
    </script>

</body>
</html>
